<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaporama</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            cursor: none;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active  { opacity: 1; }
        .slide.leaving { opacity: 0; }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow:
                0 0 20px 10px rgba(138, 43, 226, 0.8),
                0 0 40px 20px rgba(138, 43, 226, 0.5),
                0 0 60px 30px rgba(138, 43, 226, 0.3);
            border-radius: 6px;
        }

        .slide video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow:
                0 0 20px 10px rgba(138, 43, 226, 0.8),
                0 0 40px 20px rgba(138, 43, 226, 0.5),
                0 0 60px 30px rgba(138, 43, 226, 0.3);
            border-radius: 6px;
        }

        .priority-alert {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translate(-50%, -18px);
            width: min(92vw, 1520px);
            padding: 18px 24px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(127, 29, 29, .96), rgba(220, 38, 38, .94));
            color: #fff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
            border: 1px solid rgba(255, 255, 255, .16);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease, transform .25s ease;
        }

        .priority-alert.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .priority-alert-label {
            font: 700 1rem/1.1 system-ui, sans-serif;
            letter-spacing: .12em;
            text-transform: uppercase;
            opacity: .82;
            margin-bottom: 8px;
        }

        .priority-alert-message {
            font: 700 clamp(1.4rem, 2vw, 2.45rem)/1.2 system-ui, sans-serif;
            white-space: pre-wrap;
            word-break: break-word;
            text-wrap: balance;
        }
    </style>
</head>
<body>
<div id="priority-alert" class="priority-alert" aria-live="polite" aria-atomic="true">
    <div class="priority-alert-label">Alerte prioritaire</div>
    <div id="priority-alert-message" class="priority-alert-message"></div>
</div>
<script>
    const DEFAULT_DURATION = 15000;
    const FADE_DURATION    = 1500;
    const SCREEN           = new URLSearchParams(location.search).get('screen') || '';
    const SCREEN_PARAM     = SCREEN ? `?screen=${encodeURIComponent(SCREEN)}` : '';

    let media        = [];
    let durations    = {};
    let groupPools   = {};
    let sampledMedia = [];
    let currentIndex = 0;
    let currentSlide = null;
    let timer        = null;
    let alertMessage = '';
    let alertPoller  = null;

    const alertBox = document.getElementById('priority-alert');
    const alertText = document.getElementById('priority-alert-message');

    async function fetchMedia() {
        try {
            const res = await fetch('/api/images' + SCREEN_PARAM, { cache: 'no-store' });
            if (!res.ok) return media.length ? media : [];
            const fetched = await res.json();
            return fetched.length ? fetched : [];
        } catch (e) {
            return media.length ? media : [];
        }
    }

    async function fetchPools() {
        try {
            const res = await fetch('/api/pools' + SCREEN_PARAM, { cache: 'no-store' });
            if (!res.ok) return {};
            return await res.json();
        } catch (e) {
            return {};
        }
    }

    function getFilename(path) {
        return path.split('/').pop().split('?')[0];
    }

    function samplePools(mediaList, pools) {
        if (!Object.keys(pools).length) return mediaList;
        const pooledGroups = new Set(Object.keys(pools));
        const groupSamples = {};
        for (const [group, size] of Object.entries(pools)) {
            const groupItems = mediaList.filter(item => (item.groups || []).includes(group));
            const shuffled = [...groupItems];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            groupSamples[group] = new Set(shuffled.slice(0, size).map(item => getFilename(item.path)));
        }
        const result = [];
        const seen = new Set();
        for (const item of mediaList) {
            const fname = getFilename(item.path);
            if (seen.has(fname)) continue;
            seen.add(fname);
            const itemPooledGroups = (item.groups || []).filter(g => pooledGroups.has(g));
            if (itemPooledGroups.length === 0 || itemPooledGroups.some(g => groupSamples[g].has(fname))) {
                result.push(item);
            }
        }
        return result.length ? result : mediaList;
    }

    async function fetchDurations() {
        try {
            const res = await fetch('/api/durations' + SCREEN_PARAM, { cache: 'no-store' });
            if (!res.ok) return {};
            return await res.json();
        } catch (e) {
            return {};
        }
    }

    async function fetchPriorityAlert() {
        try {
            const res = await fetch('/api/priority-alert', { cache: 'no-store' });
            if (!res.ok) return alertMessage;
            const data = await res.json();
            return (data.message || '').trim();
        } catch (e) {
            return alertMessage;
        }
    }

    function renderPriorityAlert(message) {
        if (!alertBox || !alertText) return;
        if (!message) {
            alertMessage = '';
            alertText.textContent = '';
            alertBox.classList.remove('visible');
            return;
        }
        if (message === alertMessage) return;
        alertMessage = message;
        alertText.textContent = message;
        alertBox.classList.add('visible');
    }

    async function refreshPriorityAlert() {
        const message = await fetchPriorityAlert();
        if (!message && alertMessage) {
            renderPriorityAlert('');
            return;
        }
        renderPriorityAlert(message);
    }

    function getDuration(item) {
        const filename = item.path.split('/').pop().split('?')[0];
        const d = durations[filename];
        return d ? d * 1000 : DEFAULT_DURATION;
    }

    function showSlide(item) {
        const slide = document.createElement('div');
        slide.className = 'slide';

        let el;
        if (item.type === 'video') {
            el = document.createElement('video');
            el.src         = item.path + '?t=' + Date.now();
            el.autoplay    = true;
            el.muted       = true;
            el.controls    = false;
            el.playsInline = true;
        } else {
            el = document.createElement('img');
            el.src = item.path + '?t=' + Date.now();
            el.alt = '';
        }

        slide.appendChild(el);
        document.body.appendChild(slide);

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                slide.classList.add('active');
            });
        });

        if (currentSlide) {
            const old = currentSlide;
            const oldVid = old.querySelector('video');
            if (oldVid) oldVid.pause();
            old.classList.add('leaving');
            old.classList.remove('active');
            setTimeout(() => {
                if (old.parentNode) old.parentNode.removeChild(old);
            }, FADE_DURATION + 100);
        }

        currentSlide = slide;
        return el;
    }

    async function next() {
        if (timer) { clearTimeout(timer); timer = null; }

        // Rafraîchit systématiquement la liste et les durées à chaque transition
        const [freshMedia, freshDurations, freshPools] = await Promise.all([
            fetchMedia(), fetchDurations(), fetchPools()
        ]);
        durations  = freshDurations;
        groupPools = freshPools;

        if (freshMedia.length) {
            // Nouveau tirage au sort au début de chaque passage (index 0)
            if (currentIndex === 0) {
                sampledMedia = samplePools(freshMedia, groupPools);
            }
            media = sampledMedia.length ? sampledMedia : freshMedia;
            // Recentre l'index si hors bornes
            if (currentIndex >= media.length) currentIndex = 0;
        }

        if (!media.length) {
            timer = setTimeout(next, 5000);
            return;
        }

        const item = media[currentIndex];
        currentIndex = (currentIndex + 1) % media.length;

        const el       = showSlide(item);
        const duration = getDuration(item);

        if (item.type === 'video') {
            let done = false;
            const advance = () => {
                if (done) return;
                done = true;
                next();
            };
            el.addEventListener('ended', advance, { once: true });
            timer = setTimeout(advance, duration);
        } else {
            timer = setTimeout(next, duration);
        }
    }

    async function start() {
        [media, durations, groupPools] = await Promise.all([fetchMedia(), fetchDurations(), fetchPools()]);
        sampledMedia = samplePools(media, groupPools);
        media = sampledMedia.length ? sampledMedia : media;
        await refreshPriorityAlert();
        alertPoller = setInterval(refreshPriorityAlert, 1000);
        next();
    }

    start();
</script>
</body>
</html>
